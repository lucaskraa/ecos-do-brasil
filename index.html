<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta name="theme-color" content="#06110e">
  <meta name="description" content="Ecos do Brasil: Terra Invadida — jogo de ação 2D inspirado na resistência de Aimberê e na Confederação dos Tamoios.">
  <title>Ecos do Brasil: Terra Invadida</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main id="app" aria-label="Ecos do Brasil: Terra Invadida">
    <canvas id="game" width="1600" height="900" tabindex="0" aria-label="Área do jogo"></canvas>

    <section id="boot-screen" class="overlay boot-screen">
      <div class="boot-card">
        <div class="boot-symbol">◆</div>
        <h1>ECOS DO BRASIL</h1>
        <p>TERRA INVADIDA</p>
        <div class="loading-track"><div id="loading-fill" class="loading-fill"></div></div>
        <small id="loading-label">Preparando a mata...</small>
      </div>
    </section>

    <section id="error-screen" class="overlay error-screen" hidden>
      <div class="error-card">
        <h2>O jogo encontrou um erro</h2>
        <p id="error-message"></p>
        <button id="reload-button" type="button">Recarregar</button>
      </div>
    </section>

    <div id="top-actions" class="top-actions" aria-label="Ações do jogo">
      <button id="sound-button" type="button" aria-label="Ativar ou desativar som">Som</button>
      <button id="fullscreen-button" type="button" aria-label="Entrar em tela cheia">Tela cheia</button>
    </div>

    <section id="touch-controls" class="touch-controls" aria-label="Controles de toque">
      <div class="touch-left">
        <button class="touch-button touch-dir" data-key="ArrowLeft" aria-label="Mover para esquerda">◀</button>
        <button class="touch-button touch-dir" data-key="ArrowRight" aria-label="Mover para direita">▶</button>
        <button class="touch-button touch-dir" data-key="ArrowDown" aria-label="Agachar ou nadar para baixo">▼</button>
      </div>
      <div class="touch-right">
        <button class="touch-button touch-action jump" data-key="Space" aria-label="Pular">A</button>
        <button class="touch-button touch-action attack" data-key="KeyJ" aria-label="Atacar">X</button>
        <button class="touch-button touch-action bow" data-key="KeyK" aria-label="Usar arco">Y</button>
        <button class="touch-button touch-action dash" data-key="ShiftLeft" aria-label="Esquivar">B</button>
        <button class="touch-button touch-action interact" data-key="KeyE" aria-label="Interagir">E</button>
      </div>
    </section>

    <noscript>Este jogo precisa de JavaScript ativado.</noscript>
  </main>

  <script src="config.js"></script>
  <script src="assets.js"></script>
  <script src="audio.js"></script>
  <script src="story.js"></script>
  <script src="levels.js"></script>
  <script src="engine.js"></script>
  <script src="main.js"></script>
</body>
</html>
